<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restore Old Account</title>
  <link rel="stylesheet" href="/plugin-kit/kit.css" />
  <script src="/plugin-kit/kit.js" defer></script>
  <style>
    .stat { display:flex; gap:.5rem; align-items:baseline; }
    .stat b { font-size:1.4rem; }
    .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:.75rem; margin-top:1rem; }
    .box { border:1px solid rgba(255,255,255,.1); border-radius:.6rem; padding:.6rem .8rem; }
    .ok { color:#5ee6a8; } .warn { color:#ffcf6b; } .bad { color:#ff8a8a; }
    .muted { opacity:.6; font-size:.8rem; }
  </style>
</head>
<body class="ex">
  <div class="ex-card">
    <h1 class="ex-title">Restore Old Account ⤵️</h1>
    <p class="ex-muted">
      Bring your provider accounts over from the previous enowx. You must be
      <b>signed in</b> here — we match your accounts by your Discord login. Nothing
      leaves your machine except over the local app.
    </p>
    <div class="ex-row">
      <button id="go" class="ex-btn">Restore my accounts</button>
    </div>
    <div id="result" style="display:none">
      <div class="grid">
        <div class="box"><div class="stat"><b id="imported" class="ok">0</b></div><div class="muted">Imported</div></div>
        <div class="box"><div class="stat"><b id="skipped" class="warn">0</b></div><div class="muted">Already had</div></div>
        <div class="box"><div class="stat"><b id="failed" class="bad">0</b></div><div class="muted">Failed</div></div>
      </div>
      <p id="donation" class="muted" style="margin-top:.8rem"></p>
      <p id="unsupported" class="muted"></p>
      <p id="msg" class="muted"></p>
    </div>
    <pre id="err" class="ex-out" style="display:none"></pre>
  </div>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const $ = (id) => document.getElementById(id);
      $("go").onclick = async () => {
        $("go").disabled = true; $("go").textContent = "Restoring…";
        $("err").style.display = "none";
        try {
          const r = await fetch("api/restore", { method: "POST" });
          const j = await r.json();
          if (!r.ok || j.error) throw new Error(j.error || "restore failed");
          $("result").style.display = "block";
          $("imported").textContent = j.imported || 0;
          $("skipped").textContent = j.skipped || 0;
          $("failed").textContent = j.failed || 0;
          $("donation").textContent = j.donation_total_idr
            ? "Carried over your donations: Rp" + Number(j.donation_total_idr).toLocaleString("id-ID")
            : "";
          const un = j.unsupported && Object.keys(j.unsupported);
          $("unsupported").textContent = (un && un.length)
            ? "Skipped unsupported providers: " + un.join(", ") : "";
          $("msg").textContent = j.message || (j.imported ? "Done! Enable cloud sync to back them up." : "");
        } catch (e) {
          $("err").style.display = "block";
          $("err").textContent = e.message;
        } finally {
          $("go").disabled = false; $("go").textContent = "Restore my accounts";
        }
      };
    });
  </script>
</body>
</html>
